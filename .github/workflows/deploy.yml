name: Deploy to GitHub Pages

# Builds the static WASM+WebGPU site with trunk and publishes it to GitHub Pages.
# One-time setup in the repo: Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins 1.93.1 and the wasm target, so rustup installs
      # the right toolchain + target automatically on first cargo use.
      - name: Show toolchain
        run: rustup show

      - name: Cache cargo + build
        uses: Swatinem/rust-cache@v2

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      # No prebuilt wasm-bindgen-cli exists for our pinned version, so build the
      # matching CLI from source (cached by rust-cache). Must equal the
      # wasm-bindgen crate version in Cargo.lock.
      - name: Install matching wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      # Project Pages serve under /<repo>/, so assets need that base path.
      - name: Build (release)
        run: trunk build --release --public-url "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
